services:
  db:
    image: postgres:16
    container_name: stay-direct-db
    environment:
      POSTGRES_USER: stay
      POSTGRES_PASSWORD: stay_dev_password
      POSTGRES_DB: stay_direct
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stay -d stay_direct"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
