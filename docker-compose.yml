services:
  db:
    image: postgres:16
    container_name: stay-direct-db
    environment:
      POSTGRES_USER: stay
      POSTGRES_PASSWORD: stay_dev_password
      POSTGRES_DB: stay_direct
    ports:
      # host:contenedor — 5434 en el host para no chocar con el Postgres nativo
      # (5432) ni con otros contenedores; adentro Postgres sigue en 5432.
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stay -d stay_direct"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
